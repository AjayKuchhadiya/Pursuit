# Alembic configuration for Pursuit backend
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the alembic versions directory, relative to this file
script_location = alembic

# Template for new revision filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for the timestamp in revision filenames
timezone = UTC

# Database URL is read from the environment / .env file in env.py
# Do NOT put your real URL here — it would end up in version control.
sqlalchemy.url =

[post_write_hooks]
# Leave empty — no auto-formatting of generated files needed

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
