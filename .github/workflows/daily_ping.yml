name: Pursuit Keep-Alive

on:
  schedule:
    # Ping every 5 minutes to prevent Render free tier from sleeping.
    # Morning/evening WhatsApp messages are handled by APScheduler inside
    # the FastAPI process. A 5-minute interval keeps the process alive even
    # when GitHub Actions delays the job by a few minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  keep-alive:
    name: Keep-alive ping
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 \
            "${{ secrets.API_BASE_URL }}/health")
          echo "HTTP status: $STATUS"
          # 200 = healthy; 0 = app was sleeping and is now waking up (acceptable)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "000" ]; then
            echo "::warning::Health ping returned HTTP $STATUS"
          fi
